<!DOCTYPE html>
<html>

<head>
  <title>Aggie Registration Beautifier</title>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #500000 0%, #600000 100%);
      color: white;
      margin: 0;
    }

    .title {
      color: #ffffff;
      font-size: 18px;
      text-align: center;
      margin-bottom: 15px;
      font-weight: 600;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      color: #f0f0f0;
      font-size: 12px;
      text-align: center;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .enable-container {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      cursor: pointer;
      accent-color: #ffffff;
    }

    .checkbox-row label {
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      color: white;
    }

    .refresh-note {
      font-size: 11px;
      color: #f0f0f0;
      text-align: center;
      opacity: 0.8;
      font-style: italic;
    }

    .links-section {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .links-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 15px;
      color: white;
      text-align: center;
    }

    .links-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .link-button:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.5);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .link-button:active {
      transform: translateY(0px);
    }

    .link-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .link-text {
      font-weight: 500;
    }

    .review-link:hover {
      background: rgba(255, 215, 0, 0.2);
      border-color: rgba(255, 215, 0, 0.4);
    }

    .feedback-link:hover {
      background: rgba(255, 99, 71, 0.2);
      border-color: rgba(255, 99, 71, 0.4);
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
      color: #f0f0f0;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="title">Aggie Registration Beautifier</div>
  <div class="subtitle">Texas A&M Course Registration Enhancement</div>

  <div class="enable-container">
    <div class="checkbox-row">
      <input type="checkbox" id="beautifierEnabled">
      <label for="beautifierEnabled">Enable Beautifier</label>
    </div>
  </div>

  <div class="links-section">
    <div class="links-title">Feedback & Support</div>
    <div class="links-container">
      <a href="https://chromewebstore.google.com/detail/aggie-schedule-builder-pl/glckdcnecomhlmlegmjdceblibmaljpm?hl=en"
        target="_blank" class="link-button review-link">
        <span class="link-icon">⭐</span>
        <span class="link-text">Leave a Review</span>
      </a>
      <a href="https://tally.so/r/nWb6re" target="_blank" class="link-button feedback-link">
        <span class="link-icon">🐛</span>
        <span class="link-text">Report Bug / Request Feature</span>
      </a>
    </div>
  </div>

  <div class="footer">Gig 'em! 👍</div>

  <script src="popup.js"></script>
</body>

</html>
