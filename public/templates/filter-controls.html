<div class="filter-header">
    <h3>Filter Sections</h3>
</div>
<div class="filter-options">
    <div class="filter-row">
        <div class="filter-group">
            <label for="instructorFilter">Instructors:</label>
            <div id="instructorFilter" class="multi-select-container"></div>
        </div>
        <div class="filter-group">
            <label for="sectionAttributeFilter">Section Attributes:</label>
            <div id="sectionAttributeFilter" class="multi-select-container"></div>
        </div>
    </div>
    <div class="filter-row">
        <div class="filter-group">
            <label for="dayFilter">Days:</label>
            <div id="dayFilter" class="multi-select-container"></div>
        </div>
        <div class="filter-group filter-search">
            <label for="searchFilter">Search:</label>
            <input type="text" id="searchFilter" placeholder="Search titles, CRN...">
        </div>
    </div>
    <div class="filter-row checkbox-filters">
        <label class="checkbox-label">
            <input type="checkbox" id="honorsFilter">
            Honors Only
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="prereqFilter">
            No Prerequisites
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="openSeatsFilter">
            Open Seats Only
        </label>
    </div>
</div>
