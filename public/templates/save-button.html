<div class="save-actions">
    <button id="backBtn" class="back-button">
        <span class="button-text">Back</span>
    </button>
    <button id="saveAndCloseBtn" class="save-close-button">
        <span class="button-text">Save & Close</span>
        <span class="button-spinner" style="display: none;">
            <svg width="16" height="16" viewBox="0 0 24 24" class="spinner">
                <circle cx="12" cy="12" r="10" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"
                    stroke-dasharray="31.416" stroke-dashoffset="31.416">
                    <animate attributeName="stroke-dashoffset" dur="1s" values="31.416;0" repeatCount="indefinite" />
                </circle>
            </svg>
        </span>
    </button>
    <div id="saveMessage" class="save-message" style="display: none;"></div>
</div>
